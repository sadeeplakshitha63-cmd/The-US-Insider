name: Auto Content Upload
on:
  schedule:
    - cron: '0 0,12 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-generativeai feedparser requests

    - name: Run Automation Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        echo "Starting automation..." > run_log.txt
        echo "API KEY exists? ${{ secrets.GEMINI_API_KEY != '' }}" >> run_log.txt
        python automation.py >> run_log.txt 2>&1 || true

    - name: Commit and Push New Article
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add _posts/ run_log.txt
        git diff-index --quiet HEAD || git commit -m "🤖 Auto-published and generated logs"
        git push
