---
layout: default
title: Admin Dashboard
---

<div class="admin-container" style="max-width: 1000px; margin: 0 auto; padding: 40px 20px;">
    <h2>Admin Control Panel</h2>
    <p>View and manage auto-published articles via GitHub API.</p>

    <div id="auth-section" style="margin-top: 20px; padding: 20px; background: #f9f9f9; border: 1px solid #ddd;">
        <label>Enter GitHub Personal Access Token (PAT): <br><small>Requires repo scope to read/delete files.</small></label><br>
        <input type="password" id="gh-token" style="width: 100%; max-width: 400px; padding: 10px; margin-top: 10px;">
        <button onclick="loadArticles()" style="padding: 10px 20px; background: #1a1a1a; color: #fff; border: none; cursor: pointer; margin-top: 10px;">Connect</button>
    </div>

    <div id="dashboard-section" style="display: none; margin-top: 40px;">
        <div style="display: flex; gap: 20px; margin-bottom: 30px;">
            <div style="flex: 1; padding: 20px; background: #f0f0f0; text-align: center;">
                <h3 id="total-articles">0</h3>
                <p>Total Articles Uploaded</p>
            </div>
            <div style="flex: 1; padding: 20px; background: #f0f0f0; text-align: center;">
                <h3 id="last-upload">N/A</h3>
                <p>Last Upload Time</p>
            </div>
        </div>

        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="border-bottom: 2px solid #1a1a1a;">
                    <th style="padding: 10px;">Article Title (Filename)</th>
                    <th style="padding: 10px;">Size</th>
                    <th style="padding: 10px;">Action</th>
                </tr>
            </thead>
            <tbody id="articles-list">
                <!-- Articles will be loaded here -->
            </tbody>
        </table>
    </div>
</div>

<script>
    const REPO = "sadeeplakshitha63-cmd/The-US-Insider";
    let articles = [];

    async function fetchGitHubAPI(path, method = "GET", body = null) {
        const token = document.getElementById("gh-token").value;
        const headers = {
            "Accept": "application/vnd.github.v3+json",
            "Authorization": `token ${token}`
        };
        const options = { method, headers };
        if (body) {
            options.body = JSON.stringify(body);
        }
        const response = await fetch(`https://api.github.com/repos/${REPO}${path}`, options);
        if (!response.ok) throw new Error(await response.text());
        return response.json();
    }

    async function loadArticles() {
        try {
            document.getElementById('articles-list').innerHTML = "<tr><td colspan='3'>Loading data...</td></tr>";
            // Get commits to find out last upload
            const commits = await fetchGitHubAPI("/commits?path=_posts&per_page=1");
            if (commits.length > 0) {
                document.getElementById('last-upload').innerText = new Date(commits[0].commit.author.date).toLocaleString();
            }

            // Get posts contents
            articles = await fetchGitHubAPI("/contents/_posts");
            document.getElementById('total-articles').innerText = articles.length;
            
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('dashboard-section').style.display = 'block';

            renderTable();
        } catch (e) {
            alert("Error connecting: " + e.message);
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('dashboard-section').style.display = 'none';
        }
    }

    function renderTable() {
        const tbody = document.getElementById('articles-list');
        tbody.innerHTML = '';
        
        articles.sort((a,b) => b.name.localeCompare(a.name)); // Sort descending

        articles.forEach(file => {
            if (!file.name.endsWith('.md')) return;
            const tr = document.createElement('tr');
            tr.style.borderBottom = "1px solid #ddd";
            
            tr.innerHTML = `
                <td style="padding: 10px;"><a href="${file.html_url}" target="_blank" style="color: #c0392b;">${file.name}</a></td>
                <td style="padding: 10px;">${(file.size / 1024).toFixed(1)} KB</td>
                <td style="padding: 10px;">
                    <button onclick="deleteArticle('${file.name}', '${file.sha}')" style="background: red; color: white; border: none; padding: 5px 10px; cursor: pointer;">Delete</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function deleteArticle(filename, sha) {
        if (!confirm(`Are you sure you want to completely delete ${filename}? This cannot be undone.`)) return;
        try {
            await fetchGitHubAPI(`/contents/_posts/${filename}`, "DELETE", {
                message: `Admin deleted article ${filename}`,
                sha: sha
            });
            alert("Article deleted. Refreshing list...");
            loadArticles();
        } catch (e) {
            alert("Delete failed: " + e.message);
        }
    }
</script>
