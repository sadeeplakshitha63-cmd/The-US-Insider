<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }} - Breaking US News & Insights</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta name="keywords" content="{% if page.keywords %}{{ page.keywords }}{% else %}US News, AI, Technology, Health Trends, Finance USA, The US Insider{% endif %}">
    <meta name="author" content="The US Insider Editorial Team">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="{{ site.url }}{{ site.baseurl }}{{ page.url | replace:'index.html','' }}">

    <!-- Open Graph for Social Sharing -->
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
    <meta property="og:site_name" content="{{ site.title }}">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Adsterra Global Scripts -->
    <script src="https://pl29088942.profitablecpmratenetwork.com/1b/a3/a9/1ba3a92c56138637f2acc63f7283debe.js"></script>
    <script src="https://pl29088945.profitablecpmratenetwork.com/bb/5a/bf/bb5abf8110163f402a69ea9395ebbc9f.js"></script>
</head>
<body>

<header class="site-header">
    <div class="top-bar">
        <span>Authoritative AI News for the United States</span>
        <div class="top-links">
            <a href="#">About</a>
            <a href="#">Newsletter</a>
        </div>
    </div>
    <div class="logo-area">
        <a href="{{ '/' | relative_url }}" class="site-logo">
            <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="{{ site.title }}" style="max-height: 100px; width: auto;">
        </a>
    </div>
    <nav class="main-nav">
        <ul>
            <li><a href="{{ '/' | relative_url }}">HOME</a></li>
            <li><a href="#">TECH</a></li>
            <li><a href="#">HEALTH & DISEASE</a></li>
            <li><a href="#">FINANCE</a></li>
            <li><a href="#">AI</a></li>
        </ul>
    </nav>

    <!-- Adsterra Top Banner -->
    <div class="ad-container" style="text-align: center; margin: 20px 0; overflow: hidden; display: flex; justify-content: center; align-items: center;">
        <script>
            atOptions = {
                'key' : '94ea8f3f99c8ae31d8975a933b582ee0',
                'format' : 'iframe',
                'height' : 60,
                'width' : 468,
                'params' : {}
            };
        </script>
        <script src="https://www.highperformanceformat.com/94ea8f3f99c8ae31d8975a933b582ee0/invoke.js"></script>
    </div>
</header>

<main class="content-wrapper">
    {{ content }}
</main>

<footer class="site-footer">
    <div class="footer-content">
        <h2 class="footer-logo">{{ site.title | upcase }}</h2>
        <p class="footer-desc">Your authoritative source for what's trending across America.</p>
        <p class="copyright">&copy; {{ site.time | date: '%Y' }} The US Insider. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
