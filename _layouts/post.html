---
layout: default
---

<article class="single-post content-wrapper">

    <header class="post-header">
        <div class="post-category-label">
            {% if page.categories %}{{ page.categories | first | upcase }}{% else %}TRENDING{% endif %}
        </div>
        <h1 class="post-title">{{ page.title }}</h1>
        <div class="post-meta-bar">
            <span class="author">🖊 The US Insider AI</span>
            <span class="sep">·</span>
            <span class="date">{{ page.date | date: "%B %-d, %Y" }}</span>
            <span class="sep">·</span>
            <span class="read-time">6 min read</span>
        </div>
    </header>

    <!-- FEATURED ARTICLE IMAGE -->
    {% if page.image %}
    <div class="post-hero-image">
        <img src="{{ page.image }}" alt="{{ page.title }}">
    </div>
    {% else %}
    <div class="post-hero-image">
        <img src="https://images.unsplash.com/photo-1501594907352-04cda38ebc29?w=1200&h=600&fit=crop" alt="{{ page.title }}">
    </div>
    {% endif %}

    <!-- ARTICLE CONTENT -->
    <div class="post-content">
        {{ content }}
    </div>

    <!-- BACK LINK -->
    <div class="back-link">
        <a href="{{ '/' | relative_url }}">← Back to All Stories</a>
    </div>

</article>
